services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: twe-qa
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env.qa
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
