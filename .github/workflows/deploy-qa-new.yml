name: Deploy to QA

on:
  push:
    branches:
      - qa

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: |
          export VITE_APP_VERSION=$(git rev-parse --short HEAD)
          bun run build

      - name: Prepare deployment package
        run: |
          tar -czf deployment_package.tar.gz \
            dist content drizzle scripts src \
            package.json bun.lock tsconfig.json \
            Dockerfile Dockerfile.deploy .dockerignore \
            docker-compose.staging.yml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deployment_package.tar.gz
          retention-days: 1

  deploy:
    name: Deploy to QA VPS
    needs: build
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package

      - name: Transfer package to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "deployment_package.tar.gz"
          target: "~/apps/twe"

      - name: Execute remote deployment
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ~/apps/twe
            
            # Extract new files
            tar -xzf deployment_package.tar.gz
            rm deployment_package.tar.gz
            
            # Use production-optimized Dockerfile
            cp Dockerfile.deploy Dockerfile
            
            # Restart containers and clean up old images
            docker compose -f docker-compose.staging.yml up -d --build
            docker image prune -af
            
            # Wait for containers to be ready
            sleep 5
            
            # Run migrations and sync
            docker exec twe-app-staging bun run db:migrate || true
            docker exec twe-app-staging bun run db:sync
            
            echo "✅ Optimized deployment complete!"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment to QA failed!"