name: Deploy to Production

on:
  push:
    branches:
      - main # Change to master if that is your default branch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: |
          export VITE_APP_VERSION=$(git rev-parse --short HEAD)
          bun run build

      - name: Prepare deployment package
        run: |
          tar -czf deployment_package.tar.gz \
            dist content drizzle scripts src \
            package.json bun.lock tsconfig.json \
            Dockerfile Dockerfile.deploy .dockerignore \
            docker-compose.prod.yml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deployment_package.tar.gz
          retention-days: 1

  deploy:
    name: Deploy to Production VPS
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package

      - name: Transfer package to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "deployment_package.tar.gz"
          target: "~/apps/twe-prod"

      - name: Create .env.production from secrets
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ~/apps/twe-prod
            # Overwrite .env.production with values from GitHub Secrets
            cat <<EOF > .env.production
            DATABASE_URL="${{ secrets.PROD_DATABASE_URL }}"
            BETTER_AUTH_SECRET="${{ secrets.BETTER_AUTH_SECRET }}"
            BETTER_AUTH_URL="${{ secrets.PROD_BETTER_AUTH_URL }}"
            GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"
            GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}"
            SMTP_HOST="${{ secrets.SMTP_HOST }}"
            SMTP_PORT="${{ secrets.SMTP_PORT }}"
            SMTP_SECURE="${{ secrets.SMTP_SECURE }}"
            SMTP_USER="${{ secrets.SMTP_USER }}"
            SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}"
            SMTP_FROM="${{ secrets.SMTP_FROM }}"
            ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}"
            VITE_GA_MEASUREMENT_ID="${{ secrets.VITE_GA_MEASUREMENT_ID }}"
            DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}"
            VITE_SENTRY_DSN="${{ secrets.VITE_SENTRY_DSN }}"
            SENTRY_DSN="${{ secrets.SENTRY_DSN }}"
            NODE_ENV=production
            EOF

      - name: Execute remote deployment
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ~/apps/twe-prod
            
            # Extract new files
            tar -xzf deployment_package.tar.gz
            rm deployment_package.tar.gz
            
            # Use production-optimized Dockerfile
            cp Dockerfile.deploy Dockerfile
            
            # Restart containers and clean up old images
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -af
            
            # Wait for containers to be ready
            sleep 5
            
            # Run migrations and sync
            docker exec twe-app bun run db:migrate || true
            docker exec twe-app bun run db:sync
            
            echo "✅ Production deployment complete!"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment to Production failed!"
