name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: |
          export VITE_APP_VERSION=$(git rev-parse --short HEAD)
          bun run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.deploy
          push: true
          tags: ghcr.io/mihaamiharu/twe:latest,ghcr.io/mihaamiharu/twe:prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # We need to pass the compose file to the deploy job
      - name: Upload Compose File
        uses: actions/upload-artifact@v4
        with:
          name: deployment-config
          path: docker-compose.prod.yml
          retention-days: 1

  deploy:
    name: Deploy to Production VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download config
        uses: actions/download-artifact@v4
        with:
          name: deployment-config

      - name: Transfer Compose File to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.prod.yml"
          target: "~/apps/twe"

      - name: Create .env.production from secrets
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            mkdir -p ~/apps/twe
            cd ~/apps/twe
            
            # Overwrite .env.production with values from GitHub Secrets
            cat <<EOF > .env.production
            DATABASE_URL="${{ secrets.DATABASE_URL }}"
            POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
            POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
            BETTER_AUTH_SECRET="${{ secrets.BETTER_AUTH_SECRET }}"
            BETTER_AUTH_URL="${{ secrets.BETTER_AUTH_URL }}"
            GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"
            GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}"
            SMTP_HOST="${{ secrets.SMTP_HOST }}"
            SMTP_PORT="${{ secrets.SMTP_PORT }}"
            SMTP_SECURE="${{ secrets.SMTP_SECURE }}"
            SMTP_USER="${{ secrets.SMTP_USER }}"
            SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}"
            SMTP_FROM="${{ secrets.SMTP_FROM }}"
            ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}"
            GH_API_TOKEN="${{ secrets.GH_API_TOKEN }}"
            GH_OWNER="${{ vars.GH_OWNER }}"
            GH_REPO="${{ vars.GH_REPO }}"
            VITE_GA_MEASUREMENT_ID="${{ secrets.VITE_GA_MEASUREMENT_ID }}"
            DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}"
            VITE_SENTRY_DSN="${{ secrets.VITE_SENTRY_DSN }}"
            SENTRY_DSN="${{ secrets.SENTRY_DSN }}"
            SENTRY_ENVIRONMENT=production
            NODE_ENV=production
            EOF

      - name: Execute remote deployment
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ~/apps/twe
            
            echo "🔐 Logging into GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "📥 Pulling latest image..."
            docker pull ghcr.io/mihaamiharu/twe:latest
            
            echo "🔄 Restarting containers..."
            docker compose -f docker-compose.prod.yml up -d
            
            # Run migrations and sync
            echo "🗄️ Running DB migrations..."
            docker exec twe-app bun run db:migrate || true
            
            echo "📚 Syncing content..."
            docker exec twe-app bun run db:sync
            
            echo "🧹 Cleaning up old images..."
            docker image prune -af
            
            echo "✅ Deployment complete!"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment to Production failed!"
