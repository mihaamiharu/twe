name: E2E Tests

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  playwright-e2e:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout the developer's new code from the TWE Pull Request
      - name: Checkout TWE App
        uses: actions/checkout@v4
        with:
          path: twe
          
      # 2. Setup the backend environment
      - name: Setup Bun (TWE)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          
      - name: Install TWE Dependencies
        working-directory: twe
        run: bun install
        
      # 3. Spin up PostgreSQL test database exactly how TWE expects
      - name: Start Postgres Test DB
        run: |
          docker run -d -p 5433:5432 \
            -e POSTGRES_USER=twe_test \
            -e POSTGRES_PASSWORD=twe_password \
            -e POSTGRES_DB=twe_test \
            postgres:15-alpine
          sleep 5

      # 4. Prepare and boot TWE in the background
      - name: Build TWE
        working-directory: twe
        run: bun run build

      - name: Sync Database Schema
        working-directory: twe
        run: bun run db:push -- --force
        env:
          DATABASE_URL: postgresql://twe_test:twe_password@localhost:5433/twe_test
        
      - name: Start TWE Server
        working-directory: twe
        # Run in background via `&`
        run: bun run start &
        env:
          NODE_ENV: test
          E2E_SECRET: ${{ secrets.E2E_SECRET || 'CI_TEST_E2E_SECRET' }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'CI_TEST_SECRET_DO_NOT_USE_IN_PROD' }}
          BETTER_AUTH_URL: http://localhost:3000
          REQUIRE_EMAIL_VERIFICATION: false
          # Ensures the UI and APIs communicate with the fresh DB from step 3
          DATABASE_URL: postgresql://twe_test:twe_password@localhost:5433/twe_test
          
      # 5. Wait for Tanstack Start to be accessible
      - name: Wait for TWE Server Ready
        run: npx wait-on http://localhost:3000 -t 60000

      # 6. Check out the Test repository (SUB-CHECKOUT PATTERN)
      - name: Checkout E2E Tests
        uses: actions/checkout@v4
        with:
          repository: mihaamiharu/twe-e2e-tests
          path: twe-e2e-tests
          # If twe-e2e-tests was private, we would need:
          # token: ${{ secrets.PAT_TOKEN }}
          
      # 7. Setup Playwright environment for tests
      - name: Setup Node (E2E)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: twe-e2e-tests/package-lock.json
          
      - name: Install E2E Dependencies
        working-directory: twe-e2e-tests
        run: npm ci
        
      - name: Install Playwright Browsers
        working-directory: twe-e2e-tests
        run: npx playwright install --with-deps
        
      # 8. Run the external suite against the PR's infrastructure
      - name: Run Playwright Tests
        working-directory: twe-e2e-tests
        run: npx playwright test
        env:
          E2E_SECRET: ${{ secrets.E2E_SECRET || 'CI_TEST_E2E_SECRET' }}
          BASE_URL: http://localhost:3000
          # Google SSO accounts via Playwright Global Setup
          GOOGLE_TEST_EMAIL: ${{ secrets.GOOGLE_TEST_EMAIL }}
          GOOGLE_TEST_PASSWORD: ${{ secrets.GOOGLE_TEST_PASSWORD }}
          
      # 9. Archive results for PR reviewing
      - name: Upload Playwright Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: twe-e2e-tests/playwright-report/
          retention-days: 14
