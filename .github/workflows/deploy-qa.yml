name: Deploy to QA

on:
  push:
    branches:
      - qa

jobs:
  deploy:
    name: Deploy to QA VPS
    runs-on: ubuntu-latest
    environment: qa
    
    steps:
      - name: Debug Secrets
        run: |
          if [ -n "${{ secrets.VPS_HOST }}" ]; then
            echo "VPS_HOST is set (length: ${#SECRET})"
          else
            echo "VPS_HOST is NOT set"
          fi
        env:
          SECRET: ${{ secrets.VPS_HOST }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ~/apps/twe
            
            # Pull latest code
            git fetch origin qa
            git checkout qa
            git pull origin qa
            
            # Rebuild and restart containers
            docker compose -f docker-compose.staging.yml up -d --build
            
            # Wait for containers to be ready
            sleep 10
            
            # Run migrations and sync challenges
            docker exec twe-app-staging bun run db:migrate || true
            docker exec twe-app-staging bun run db:sync
            
            echo "✅ Deployment complete!"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment to QA failed!"
