services:
  app:
    image: ghcr.io/mihaamiharu/twe:latest
    container_name: twe-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: twe-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    env_file:
      - .env.production
    # environment:
    #   Variables are loaded from .env.production via env_file
    #   Standard postgres image uses POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB name directly
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - shared_buffers=1GB
      - -c
      - effective_cache_size=3GB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - work_mem=16MB
      - -c
      - wal_buffers=8MB
      - -c
      - max_connections=100
      - -c
      - max_wal_size=1GB
      - -c
      - min_wal_size=80MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U twe_user -d twe_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
